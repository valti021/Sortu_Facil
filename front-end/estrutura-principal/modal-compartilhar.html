<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modal Compartilhar</title>
</head>
<body>
    
    <div id="modal-compartilhar" class="modal">
        <div class="modal-conteudo">
            <i class="fa-solid fa-xmark" id="fechar-modal-compartilhar"></i>

            <h2>Compartilhar Rifa</h2>
            <p>Compartilhe sua rifa com amigos e familiares!</p>
            <div class="conteiner-link-img">
                <input type="text" id="link-rifa" value="https://exemplo.com/rifa/12345" readonly>
                <button id="copiar-link">Copiar Link</button>
                <span>Ou</span>
            <button id="baixar-img">Baixar Imagem</button>
            </div>
        </div>
    </div>

</body>
</html>
