<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sortu Fácil - Redirecionando...</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #0f5132, #198754);
            color: white;
        }

        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.08);
            padding: 40px;
            border-radius: 16px;
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .img {
            width: 80px;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 24px;
            margin-bottom: 10px;
        }

        p {
            opacity: 0.8;
            margin-bottom: 20px;
        }

        .loader {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(255,255,255,0.2);
            border-top: 4px solid #ffc107;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="./front-end/midia/logo/logo.png" alt="Sortu Fácil logo" class="img">
        <h1>Sortu Fácil</h1>
        <p>Redirecionando para a aplicação...</p>
        <div class="loader"></div>
    </div>

    <script>
        setTimeout(() => {
            window.location.href = '/sortu_facil/front-end/index.html';
        }, 8000); // 8 segundos pra dar tempo de ver a animação
    </script>

</body>
</html>
